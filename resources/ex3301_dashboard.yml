title: Zyxel EX3301-T0
views:
  - title: Overview
    path: zyxel-ex3301
    icon: mdi:router
    theme: Backend-selected
    type: sections
    sections:

      # ── Header ──────────────────────────────────────────────────────────────
      - type: grid
        column_span: 4
        cards:
          - type: picture
            image: https://raw.githubusercontent.com/MJP-76/ha-zyxel/main/resources/logo.png
            alt_text: Zyxel
            style:
              height: 50px
              object-fit: contain
              background: transparent
          - type: heading
            heading: Zyxel EX3301-T0
            heading_style: title
            icon: mdi:router

      # ── Device info ─────────────────────────────────────────────────────────
      - type: grid
        title: Device
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: sensor.zyxel_system_uptime
                state_not: unavailable
              - condition: state
                entity: sensor.zyxel_system_uptime
                state_not: unknown
            card:
              type: custom:mushroom-template-card
              entity: sensor.zyxel_system_uptime
              primary: >
                {% set s = states(entity) | int(0) %}
                {% set d = (s // 86400) %}
                {% set h = (s % 86400) // 3600 %}
                {% set m = (s % 3600) // 60 %}
                {% if d > 0 %}{{ d }}d {{ h }}h
                {% elif h > 0 %}{{ h }}h {{ m }}m
                {% else %}{{ m }}m
                {% endif %}
              secondary: System Uptime
              icon: mdi:clock-outline
              icon_color: blue
              tap_action:
                action: more-info

          - type: conditional
            conditions:
              - condition: state
                entity: sensor.zyxel_firmware_version
                state_not: unavailable
              - condition: state
                entity: sensor.zyxel_firmware_version
                state_not: unknown
            card:
              type: custom:mushroom-entity-card
              entity: sensor.zyxel_firmware_version
              name: Firmware
              primary_info: state
              secondary_info: name
              icon: mdi:information-outline

          - type: conditional
            conditions:
              - condition: state
                entity: sensor.zyxel_model
                state_not: unavailable
              - condition: state
                entity: sensor.zyxel_model
                state_not: unknown
            card:
              type: custom:mushroom-entity-card
              entity: sensor.zyxel_model
              name: Model
              primary_info: state
              secondary_info: name
              icon: mdi:router

          - type: entities
            title: Device Details
            entities:
              - entity: sensor.zyxel_hardware_version
                name: Hardware
              - entity: sensor.zyxel_serial_number
                name: Serial Number
              - entity: sensor.zyxel_ip_address
                name: LAN IP
              - entity: sensor.zyxel_device_temperature
                name: Temperature

      # ── WAN connectivity ─────────────────────────────────────────────────────
      - type: grid
        title: WAN
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: sensor.zyxel_ppp_connection_status_wan_2
                state_not: unavailable
              - condition: state
                entity: sensor.zyxel_ppp_connection_status_wan_2
                state_not: unknown
            card:
              type: custom:mushroom-template-card
              entity: sensor.zyxel_ppp_connection_status_wan_2
              primary: "{{ states(entity) }}"
              secondary: WAN 2 PPPoE Status
              icon: mdi:wan
              icon_color: >
                {{ 'green' if states(entity) == 'Connected' else 'red' }}
              tap_action:
                action: more-info

          - type: conditional
            conditions:
              - condition: state
                entity: sensor.zyxel_ip_address_wan_2
                state_not: unavailable
              - condition: state
                entity: sensor.zyxel_ip_address_wan_2
                state_not: unknown
            card:
              type: custom:mushroom-entity-card
              entity: sensor.zyxel_ip_address_wan_2
              name: WAN 2 IP
              primary_info: state
              secondary_info: name
              icon: mdi:ip-network

          - type: conditional
            conditions:
              - condition: state
                entity: sensor.zyxel_wan_gateway_ip_wan_2
                state_not: unavailable
              - condition: state
                entity: sensor.zyxel_wan_gateway_ip_wan_2
                state_not: unknown
            card:
              type: custom:mushroom-entity-card
              entity: sensor.zyxel_wan_gateway_ip_wan_2
              name: WAN 2 Gateway
              primary_info: state
              secondary_info: name
              icon: mdi:router-network

          - type: entities
            title: WAN Details
            entities:
              - entity: sensor.zyxel_wan_ethernet_status
                name: Ethernet Link
              - entity: sensor.zyxel_ip_address_wan_0
                name: WAN 0 IP
              - entity: sensor.zyxel_ppp_connection_status_wan_0
                name: WAN 0 PPP
              - entity: sensor.zyxel_ppp_connection_status_wan_1
                name: WAN 1 PPP
              - entity: sensor.zyxel_ppp_connection_status_wan_2
                name: WAN 2 PPP

      # ── Uptime / Connection times ────────────────────────────────────────────
      - type: grid
        title: Connection Uptime
        cards:
          - type: entities
            title: IPoE Uptime
            entities:
              - entity: sensor.zyxel_ipoe_connection_uptime_wan_0
                name: WAN 0
              - entity: sensor.zyxel_ipoe_connection_uptime_wan_1
                name: WAN 1
              - entity: sensor.zyxel_ipoe_connection_uptime_wan_2
                name: WAN 2

          - type: entities
            title: PPPoE Uptime
            entities:
              - entity: sensor.zyxel_pppoe_connection_uptime_wan_1
                name: WAN 1
              - entity: sensor.zyxel_pppoe_connection_uptime_wan_2
                name: WAN 2

      # ── DSL ──────────────────────────────────────────────────────────────────
      - type: grid
        title: DSL
        cards:
          - type: entities
            title: DSL Rates
            entities:
              - entity: sensor.zyxel_dsl_downstream_rate_dsl_ch_0
                name: Downstream (Ch 0)
              - entity: sensor.zyxel_dsl_downstream_rate_dsl_ch_1
                name: Downstream (Ch 1)
              - entity: sensor.zyxel_dsl_upstream_rate_dsl_ch_0
                name: Upstream (Ch 0)
              - entity: sensor.zyxel_dsl_upstream_rate_dsl_ch_1
                name: Upstream (Ch 1)

      # ── Network / DHCP ────────────────────────────────────────────────────────
      - type: grid
        title: Network
        cards:
          - type: entities
            title: DHCP Status
            entities:
              - entity: sensor.zyxel_dhcp_status_wan_0
                name: WAN 0
              - entity: sensor.zyxel_dhcp_status_wan_1
                name: WAN 1
              - entity: sensor.zyxel_dhcp_status_wan_2
                name: WAN 2

          - type: entities
            title: DNS & Routing
            entities:
              - entity: sensor.zyxel_dns_server_dns_0
                name: DNS Server
              - entity: sensor.zyxel_is_default_route_wan_0
                name: Default Route (WAN 0)
              - entity: sensor.zyxel_is_default_route_wan_1
                name: Default Route (WAN 1)
              - entity: sensor.zyxel_is_default_route_wan_2
                name: Default Route (WAN 2)

      # ── Actions ───────────────────────────────────────────────────────────────
      - type: grid
        title: Actions
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: button.zyxel_reboot_device
                state_not: unavailable
            card:
              type: button
              entity: button.zyxel_reboot_device
              name: Reboot Router
              icon: mdi:restart
              tap_action:
                action: call-service
                service: button.press
                target:
                  entity_id: button.zyxel_reboot_device
              confirmation:
                text: Are you sure you want to reboot the Zyxel router?
